<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalesBot Chatbot Test</title>
    <script
      src="https://chatbot-testing-five.vercel.app/loader.js?v=2"
      data-bot-id="BOT_ID_HERE"
      data-widget-url="https://chatbot-testing-five.vercel.app/chatbot.js?v=2"
      data-widget-css-url="https://chatbot-testing-five.vercel.app/style.css?v=2"
      async
    ></script>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: #f4f7ff;
        color: #111827;
      }
      .wrap {
        max-width: 920px;
        margin: 40px auto;
        padding: 24px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }
      p {
        margin: 0 0 10px;
        color: #4b5563;
        line-height: 1.6;
      }
      code {
        background: #eef2ff;
        color: #3730a3;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>SalesBot Embed Test</h1>
        <p>
          This is a sample deployment page for testing the SalesBot chatbot
          loader.
        </p>
        <p>
          Update <code>BOT_ID_HERE</code> in this file before production test.
        </p>
        <p>
          If your API is hosted elsewhere, set <code>data-api-url</code> as
          needed.
        </p>
      </section>
    </main>

    <!-- SalesBot loader script -->
  </body>
</html>
